<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 1280px;
        height: 440px;
        background:
          radial-gradient(ellipse 520px 360px at 74% 52%, rgba(35, 45, 76, 0.34), rgba(12, 12, 14, 0) 72%),
          radial-gradient(ellipse 460px 330px at 93% 76%, rgba(83, 54, 131, 0.34), rgba(12, 12, 14, 0) 70%),
          radial-gradient(ellipse 520px 350px at 17% 42%, rgba(37, 79, 135, 0.28), rgba(12, 12, 14, 0) 72%),
          linear-gradient(112deg, #0b111c 0%, #0c0c0e 43%, #10111b 70%, #171225 100%);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }
      .grain {
        position: absolute;
        z-index: 1;
        inset: 0;
        pointer-events: none;
        opacity: 0.026;
        mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='160' height='160' filter='url(%23n)' opacity='0.9'/%3E%3C/svg%3E");
        background-size: 160px 160px;
      }
      .content {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 60px;
      }
      .text-side {
        max-width: 380px;
        color: white;
      }
      .badge {
        display: inline-block;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #60a5fa;
        background: rgba(59, 130, 246, 0.1);
        border: 1px solid rgba(59, 130, 246, 0.2);
        padding: 4px 12px;
        border-radius: 20px;
        margin-bottom: 20px;
      }
      .headline {
        font-size: 36px;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1.15;
        margin-bottom: 16px;
        background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .subhead {
        font-size: 16px;
        font-weight: 400;
        line-height: 1.65;
        color: #8b8b96;
      }
      .popup-frame {
        position: relative;
        isolation: isolate;
        border-radius: 14px;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
        overflow: visible;
        flex-shrink: 0;
      }
      .popup-frame::before {
        content: '';
        position: absolute;
        z-index: -1;
        inset: -74px -94px -88px -94px;
        border-radius: 72px;
        background: radial-gradient(
          ellipse at 50% 48%,
          rgba(47, 63, 99, 0.24) 0%,
          rgba(33, 42, 68, 0.18) 34%,
          rgba(20, 24, 39, 0.08) 60%,
          rgba(12, 12, 14, 0) 86%
        );
      }
      .popup-frame img {
        position: relative;
        z-index: 1;
        display: block;
        width: 320px;
        height: auto;
        border-radius: 14px;
      }
      /* Variant: side-by-side */
      .side-by-side .content {
        gap: 40px;
      }
      .side-by-side .text-side {
        max-width: 320px;
      }
      .side-by-side .popups {
        display: flex;
        gap: 24px;
        align-items: flex-start;
      }
      .side-by-side .popup-frame {
        border-radius: 12px;
      }
      .side-by-side .popup-frame img {
        width: 300px;
      }
      .side-by-side .popup-frame.secondary {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body id="scene">
    <div class="grain" aria-hidden="true"></div>
    <div class="content" id="content"></div>
  </body>
</html>
