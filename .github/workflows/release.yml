name: Release to Chrome Web Store

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      dry-run:
        description: 'Test auth and upload without publishing'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Test, Build & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec wxt prepare

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test

      - name: Bump version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          pnpm version ${{ inputs.version }} --no-git-tag-version
          NEW_VERSION=$(jq -r '.version' package.json)
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to v${NEW_VERSION}"

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm check

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: xvfb-run pnpm exec playwright test e2e/popup.spec.ts

      - name: Zip
        run: pnpm zip

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push --follow-tags

      - name: Publish to Chrome Web Store
        env:
          SA_KEY_JSON: ${{ secrets.CHROME_SERVICE_ACCOUNT_KEY }}
          PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          EXTENSION_ID: lkahbfdjppdglmacdhifnfaokjealmba
        run: |
          set -euo pipefail

          # Parse service account key and mask derived secrets
          SA_EMAIL=$(echo "$SA_KEY_JSON" | jq -r '.client_email')
          PRIVATE_KEY=$(echo "$SA_KEY_JSON" | jq -r '.private_key')
          echo "::add-mask::${SA_EMAIL}"

          # Base64url encode helper
          b64url() { openssl base64 -A | tr '+/' '-_' | tr -d '='; }

          # Build JWT for Chrome Web Store API
          NOW=$(date +%s)
          EXP=$((NOW + 3600))

          HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)
          PAYLOAD=$(printf '{"iss":"%s","scope":"https://www.googleapis.com/auth/chromewebstore","aud":"https://oauth2.googleapis.com/token","iat":%d,"exp":%d}' \
            "$SA_EMAIL" "$NOW" "$EXP" | b64url)
          SIGNATURE=$(printf '%s.%s' "$HEADER" "$PAYLOAD" \
            | openssl dgst -sha256 -sign <(printf '%s' "$PRIVATE_KEY") -binary | b64url)

          JWT="${HEADER}.${PAYLOAD}.${SIGNATURE}"

          # Exchange JWT for access token
          ACCESS_TOKEN=$(curl -sf -X POST 'https://oauth2.googleapis.com/token' \
            -d "grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${JWT}" \
            | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "::error::Failed to obtain access token"
            exit 1
          fi
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "::add-mask::${JWT}"

          API_BASE="https://chromewebstore.googleapis.com"
          ITEM_PATH="publishers/${PUBLISHER_ID}/items/${EXTENSION_ID}"

          # Upload zip
          ZIP_FILE=$(ls .output/*-chrome.zip)
          echo "Uploading ${ZIP_FILE}..."
          HTTP_CODE=$(curl -s -o /tmp/upload_response.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -T "$ZIP_FILE" \
            "${API_BASE}/upload/v2/${ITEM_PATH}:upload")

          echo "Upload HTTP status: ${HTTP_CODE}"
          # Only show safe fields from the response (no emails, project IDs, etc.)
          jq '{uploadState, itemId, crxVersion}' /tmp/upload_response.json 2>/dev/null || echo "(no JSON response)"

          if [ "$HTTP_CODE" -ge 400 ]; then
            ERROR_MSG=$(jq -r '.error.message // .error // "unknown error"' /tmp/upload_response.json 2>/dev/null || echo "HTTP ${HTTP_CODE}")
            echo "::error::Upload failed: ${ERROR_MSG}"
            exit 1
          fi

          UPLOAD_STATE=$(jq -r '.uploadState' /tmp/upload_response.json)

          if [ "$UPLOAD_STATE" = "FAILURE" ]; then
            echo "::error::Upload failed"
            exit 1
          fi

          # Poll until upload completes if still in progress
          while [ "$UPLOAD_STATE" = "UPLOAD_IN_PROGRESS" ]; do
            echo "Upload in progress, polling..."
            sleep 5
            curl -s -o /tmp/status_response.json \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -H "x-goog-api-version: 2" \
              "${API_BASE}/v2/${ITEM_PATH}:fetchStatus"
            UPLOAD_STATE=$(jq -r '.uploadState' /tmp/status_response.json)
            jq '{uploadState, itemId, crxVersion}' /tmp/status_response.json 2>/dev/null
          done

          # Publish (skip in dry-run mode)
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "Dry run — skipping publish"
            exit 0
          fi

          echo "Publishing..."
          HTTP_CODE=$(curl -s -o /tmp/publish_response.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "${API_BASE}/v2/${ITEM_PATH}:publish")

          echo "Publish HTTP status: ${HTTP_CODE}"
          jq '{state, itemId}' /tmp/publish_response.json 2>/dev/null || echo "(no JSON response)"

          if [ "$HTTP_CODE" -ge 400 ]; then
            ERROR_MSG=$(jq -r '.error.message // .error // "unknown error"' /tmp/publish_response.json 2>/dev/null || echo "HTTP ${HTTP_CODE}")
            echo "::error::Publish failed: ${ERROR_MSG}"
            exit 1
          fi

          echo "Published successfully!"
